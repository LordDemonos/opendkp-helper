# On version tags: lint, package both store zips, attach dist/ to the workflow run.
name: Release packages

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-packages-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  package:
    name: Lint and package Firefox + Chrome
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package release (dist/*.zip + SHA256SUMS)
        run: npm run package:release

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opendkp-helper-dist-${{ github.ref_name }}
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90
