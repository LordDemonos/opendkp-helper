name: Build Release Packages

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: build-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build-release:
    name: Build Firefox and Chrome release ZIPs
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Verify release tag matches manifest version
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG="${TAG#v}"
          VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version)")
          echo "Release tag (normalized): ${TAG}"
          echo "manifest.json version: ${VER}"
          if [ "${VER}" != "${TAG}" ]; then
            echo "::error::manifest.json version (${VER}) must match the GitHub release tag (${TAG}). Bump manifest and options.html, commit, retag, or fix the release tag."
            exit 1
          fi
          echo "✅ Tag and manifest version match."

      - name: Extract version for artifacts
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')).version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release build version: ${VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Package release (dist/*.zip + SHA256SUMS)
        run: npm run package:release

      - name: Upload release assets (GitHub Release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2.6.2
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
          tag_name: ${{ github.event.release.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: opendkp-helper-dist-v${{ steps.version.outputs.version }}
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Output summary
        run: |
          echo "✅ Build complete."
          echo "Chrome ZIP: dist/opendkp-helper-chrome-${{ steps.version.outputs.version }}.zip"
          echo "Firefox ZIP: dist/opendkp-helper-firefox-${{ steps.version.outputs.version }}.zip"
          ls -lh dist/
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "Assets attached to release ${{ github.event.release.tag_name }}."
          else
            echo "Artifacts uploaded for workflow_dispatch (see Actions → this run → Artifacts)."
          fi
