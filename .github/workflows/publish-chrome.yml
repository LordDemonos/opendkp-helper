name: Publish to Chrome Web Store

# Builds the Chrome ZIP and uploads it as a workflow artifact for manual Web Store upload.
# Does not call the Chrome Web Store API (refresh tokens expire; we publish manually).

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-chrome-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Chrome extension package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package release (Chrome + Firefox zips in dist/)
        run: npm run package:release

      - name: Resolve Chrome ZIP path
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('manifest.json', 'utf8')).version)")
          ZIP_NAME="opendkp-helper-chrome-${VERSION}.zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          ls -lh "dist/${ZIP_NAME}"

      - name: Upload Chrome extension package
        uses: actions/upload-artifact@v4
        with:
          name: chrome-webstore-package
          path: dist/opendkp-helper-chrome-*.zip
          retention-days: 30
          if-no-files-found: error

      - name: Output package info
        run: |
          echo "Chrome package artifact: chrome-webstore-package (${ZIP_NAME})"
          echo "Download the artifact and upload manually in the Chrome Web Store developer dashboard."
          echo "API auto-upload is disabled (manual publish)."
