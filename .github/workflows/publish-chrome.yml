name: Publish to Chrome Web Store

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-chrome-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build Chrome extension package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure manifest for Chrome
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          if (manifest.background && manifest.background.scripts) {
            delete manifest.background.scripts;
          }
          if (!manifest.background) manifest.background = {};
          manifest.background.service_worker = 'background.js';
          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log('Chrome manifest: background.service_worker =', manifest.background.service_worker);
          "

      - name: Package extension
        run: |
          mkdir -p chrome-package
          mkdir -p package-build

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.md' \
            --exclude='README.md' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='test_audio.html' \
            --exclude='test_audio.js' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='*.tmp' \
            --exclude='*.bak' \
            --exclude='popup-firefox.js' \
            ./ package-build/

          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package-build/manifest.json', 'utf8')).version)")
          ZIP_NAME="opendkp-helper-v${VERSION}-chrome.zip"
          cd package-build
          zip -r "../chrome-package/${ZIP_NAME}" .
          cd ..
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Built ${ZIP_NAME}"
          ls -lh chrome-package/

      - name: Upload Chrome extension package
        uses: actions/upload-artifact@v4
        with:
          name: chrome-webstore-package
          path: chrome-package/*.zip
          retention-days: 30
          if-no-files-found: error

      # Do not use uses: fregante/chrome-webstore-upload@* — that package is not a resolvable GitHub Action.
      # Avoid secrets.* in job/if where disallowed; detect credentials in a step and gate on outputs.
      - name: Detect Chrome Web Store credentials
        id: chrome_creds
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          if [ -n "$CHROME_EXTENSION_ID" ] && [ -n "$CHROME_CLIENT_ID" ] && [ -n "$CHROME_CLIENT_SECRET" ] && [ -n "$CHROME_REFRESH_TOKEN" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to Chrome Web Store
        if: ${{ steps.chrome_creds.outputs.has_credentials == 'true' }}
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@3.5.0 \
            --source "chrome-package/${ZIP_NAME}" \
            --extension-id "${{ secrets.CHROME_EXTENSION_ID }}"

      - name: Skip Chrome Web Store upload (credentials incomplete)
        if: ${{ steps.chrome_creds.outputs.has_credentials != 'true' }}
        run: |
          echo "::notice::Chrome Web Store API secrets incomplete — skipped upload. Artifact contains the ZIP for manual upload."
          echo "Required secrets: CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN"

      - name: Output package info
        run: |
          echo "Chrome package artifact: chrome-webstore-package"
          echo "See https://developer.chrome.com/docs/webstore/using-api"
