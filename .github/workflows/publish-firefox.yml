name: Publish to Firefox Add-ons (AMO)

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-firefox-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Build and optionally sign for AMO
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package release (store-ready trees + dist/*.zip)
        run: |
          npm run package:release
          mkdir -p web-ext-artifacts

      - name: Lint extension (web-ext)
        run: npx web-ext lint --source-dir build/temp-firefox-build/
        continue-on-error: true

      # IMPORTANT: avoid using secrets.* directly in `if:` expressions.
      - name: Detect AMO credentials
        id: amo_creds
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -n "$AMO_JWT_ISSUER" ] && [ -n "$AMO_JWT_SECRET" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      # web-ext --channel listed = public AMO listing & automatic updates for AMO installs.
      # --channel unlisted = self-distribution only; does not update the listed product line.
      # AMO rejects duplicate manifest.version; bump version before re-signing (see CHANGELOG).
      - name: Sign and publish to AMO
        id: sign
        if: ${{ steps.amo_creds.outputs.has_credentials == 'true' }}
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          CHANNEL="${{ vars.AMO_CHANNEL }}"
          [ -z "$CHANNEL" ] && CHANNEL="listed"
          echo "Using AMO channel: ${CHANNEL}"
          npx web-ext sign \
            --source-dir build/temp-firefox-build/ \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --channel "$CHANNEL" \
            --artifacts-dir web-ext-artifacts/

      - name: Skip sign (no AMO API credentials)
        if: ${{ steps.amo_creds.outputs.has_credentials != 'true' }}
        run: |
          echo "::notice::AMO_JWT_ISSUER / AMO_JWT_SECRET not set — skipped web-ext sign."
          echo "Upload dist/opendkp-helper-firefox-*.zip manually to AMO, or add API keys in repo secrets."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firefox-amo-package
          path: |
            dist/opendkp-helper-firefox-*.zip
            web-ext-artifacts/*.xpi
          if-no-files-found: warn
          retention-days: 30

      - name: Output submission info
        run: |
          echo "Firefox packaging complete."
          echo "Repo variable AMO_CHANNEL (optional): listed (default) | unlisted"
          echo "Secrets for auto-sign: AMO_JWT_ISSUER, AMO_JWT_SECRET"
