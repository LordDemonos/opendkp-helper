name: Publish to Firefox Add-ons (AMO)

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: publish-firefox-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    name: Build and optionally sign for AMO
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Configure manifest for Firefox
        run: |
          node -e "
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));

          if (manifest.background && manifest.background.service_worker) {
            delete manifest.background.service_worker;
          }
          if (!manifest.background) manifest.background = {};
          if (!manifest.background.scripts || !Array.isArray(manifest.background.scripts)) {
            manifest.background.scripts = ['background.js'];
          }
          if (!manifest.license) manifest.license = 'MIT';

          fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2) + '\n');
          console.log('Firefox manifest: background.scripts =', manifest.background.scripts);
          "

      - name: Package extension
        run: |
          mkdir -p web-ext-artifacts
          mkdir -p package-build

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='*.md' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='test_audio.html' \
            --exclude='test_audio.js' \
            --exclude='popup.js' \
            --exclude='.gitignore' \
            --exclude='.DS_Store' \
            --exclude='*.log' \
            --exclude='*.tmp' \
            --exclude='*.bak' \
            ./ package-build/

          cd package-build
          zip -r ../web-ext-artifacts/opendkp-helper-firefox-source.zip .
          cd ..

          echo "Packaged to web-ext-artifacts/opendkp-helper-firefox-source.zip"
          ls -lh web-ext-artifacts/

      - name: Lint extension (web-ext)
        run: web-ext lint --source-dir package-build/
        continue-on-error: true

      # IMPORTANT: avoid using secrets.* directly in `if:` expressions.
      # Detect credential presence in a step output, then gate later steps on that output.
      - name: Detect AMO credentials
        id: amo_creds
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          if [ -n "$AMO_JWT_ISSUER" ] && [ -n "$AMO_JWT_SECRET" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign and publish to AMO
        id: sign
        if: ${{ steps.amo_creds.outputs.has_credentials == 'true' }}
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          CHANNEL="${{ vars.AMO_CHANNEL }}"
          [ -z "$CHANNEL" ] && CHANNEL="unlisted"
          echo "Using AMO channel: ${CHANNEL}"
          web-ext sign \
            --source-dir package-build/ \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET" \
            --channel "$CHANNEL" \
            --artifacts-dir web-ext-artifacts/

      - name: Skip sign (no AMO API credentials)
        if: ${{ steps.amo_creds.outputs.has_credentials != 'true' }}
        run: |
          echo "::notice::AMO_JWT_ISSUER / AMO_JWT_SECRET not set — skipped web-ext sign."
          echo "Upload web-ext-artifacts/opendkp-helper-firefox-source.zip manually to AMO, or add API keys in repo secrets."

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firefox-amo-package
          path: |
            web-ext-artifacts/*.zip
            web-ext-artifacts/*.xpi
          if-no-files-found: warn
          retention-days: 30

      - name: Output submission info
        run: |
          echo "Firefox packaging complete."
          echo "Repository variable AMO_CHANNEL (optional): listed | unlisted (default in script: unlisted)."
          echo "Secrets for auto-sign: AMO_JWT_ISSUER, AMO_JWT_SECRET (JWT from AMO dev hub)."
