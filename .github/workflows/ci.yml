# Deterministic checks for every PR and push (ubuntu + pinned Node).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build-and-test:
    name: Validate manifest, build, extension smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          echo "✅ npm ci completed"

      - name: Validate manifest.json (parse + MV3 fields)
        run: |
          node scripts/validate-manifest.js

      - name: web-ext lint (Firefox addons-linter)
        run: npm run lint:webext

      - name: Build Chrome package (temp dir)
        run: npm run build:chrome

      - name: Build Firefox package (temp dir)
        run: npm run build:firefox

      - name: Install xvfb (headful Puppeteer on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Extension smoke test (Puppeteer + Chrome)
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 1280x1024x24' npm run test:chrome
