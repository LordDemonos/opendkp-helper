<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html {
      height: 100%;
      overflow: hidden;
    }
    
    body {
      width: 300px;
      height: auto;
      max-height: 600px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      margin: 0;
      background: #f8f9fa;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-shrink: 0;
    }
    
    .header h1 {
      margin: 0;
      font-size: 16px;
      color: #333;
    }
    
    .header-icons {
      display: flex;
      gap: 8px;
    }
    
    .icon-btn {
      background: none;
      border: none;
      padding: 4px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px;
      transition: background-color 0.2s;
    }
    
    .icon-btn:hover {
      background-color: #f0f0f0;
    }
    
    .icon-btn:active {
      background-color: #e0e0e0;
    }
    
    .status {
      background: #e8f5e8;
      border: 1px solid #4caf50;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 16px;
      text-align: center;
      flex-shrink: 0;
    }
    /* Inline volume control */
    .volume-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      justify-content: center;
      flex-shrink: 0;
    }
    .volume-inline input[type="range"] {
      width: 160px;
    }
    .vol-icon {
      font-size: 18px;
      padding: 4px 6px;
      border-radius: 4px;
      cursor: pointer;
      transition: box-shadow 0.2s, background 0.2s;
      user-select: none;
    }

    .volume-pct {
      min-width: 32px;
      text-align: right;
      font-weight: 600;
      color: #1976d2;
    }
    .vol-dirty { box-shadow: 0 0 0 2px rgba(244,67,54,0.35); background: rgba(244,67,54,0.08); }
    .vol-saved { box-shadow: 0 0 0 2px rgba(76,175,80,0.35); background: rgba(76,175,80,0.08); }
    
    .status.active {
      background: #e8f5e8;
      border-color: #4caf50;
      color: #2e7d32;
    }
    
    .status.inactive {
      background: #fff3e0;
      border-color: #ff9800;
      color: #e65100;
    }
    
    .status.success {
      background: #e8f5e8;
      border-color: #4caf50;
      color: #2e7d32;
    }
    
    .status.error {
      background: #ffebee;
      border-color: #f44336;
      color: #c62828;
    }
    
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    
    .btn-primary {
      background: #1976d2;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1565c0;
    }
    
    .btn-secondary {
      background: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
    }
    
    .btn-secondary:hover {
      background: #eeeeee;
    }
    
    .info {
      margin-top: 16px;
      padding: 12px;
      background: #e3f2fd;
      border-radius: 6px;
      font-size: 12px;
      color: #1976d2;
      flex-shrink: 0;
    }
    
    .empty-state {
      text-align: center;
      color: #666;
      font-style: italic;
      padding: 20px;
    }
    
    .eq-log-section {
      margin-top: 16px;
      padding: 12px;
      background: #f0f8ff;
      border-radius: 6px;
      border: 1px solid #2196f3;
      flex: 1 1 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    
    .eq-log-section > div {
      flex-shrink: 0;
    }
    
    .eq-log-section h3 {
      margin: 0;
      font-size: 14px;
      color: #1976d2;
      flex-shrink: 0;
    }
    
    .eq-log-events {
      margin-top: 12px;
      flex: 1 1 0;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
      min-height: 0;
    }
    
    .eq-log-event {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    
    /* Custom scrollbar styling */
    .eq-log-events::-webkit-scrollbar {
      width: 8px;
    }
    
    .eq-log-events::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 4px;
    }
    
    .eq-log-events::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 4px;
    }
    
    .eq-log-events::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
    
    
    .eq-log-event {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 10px;
    }
    
    .eq-log-event-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #e0e0e0;
    }

    .eq-log-event-header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    
    .eq-log-event-timestamp {
      font-size: 11px;
      color: #666;
      font-weight: 500;
    }
    
    .eq-log-event-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: #999;
      padding: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
    }
    
    .eq-log-event-close:hover {
      background: #f5f5f5;
      color: #333;
    }
    
    .eq-log-items {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .eq-log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: #f8f9fa;
      border-radius: 3px;
      border: 1px solid #e0e0e0;
    }
    
    .eq-log-item-name {
      font-size: 12px;
      color: #333;
      flex: 1;
      margin-right: 8px;
    }
    
    .eq-log-item-copy {
      padding: 4px 8px;
      font-size: 11px;
    }

    .eq-log-item-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .eq-log-item-queue {
      padding: 4px 8px;
      font-size: 11px;
      background: #2e7d32;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .eq-log-item-queue:hover {
      background: #1b5e20;
    }

    .eq-log-item-queue:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .eq-log-raid-status {
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
    }

    .eq-log-raid-status.eq-log-raid-status-invalid {
      color: #c62828;
    }

    .api-session-row {
      display: none;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .api-session-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
    }

    .api-session-btn {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      padding: 0;
      font-size: 16px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .api-raid-select {
      flex: 1 1 0;
      min-width: 0;
      font-size: 11px;
      padding: 5px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
    }

    .api-session-hint {
      width: 100%;
      font-size: 10px;
      color: #666;
      line-height: 1.3;
    }

    .api-session-hint.api-session-hint-invalid {
      color: #c62828;
    }

    body.dark-mode .api-raid-select {
      background: #2d2d2d;
      border-color: #555;
      color: #e0e0e0;
    }

    body.dark-mode .api-session-hint {
      color: #90a4b8;
    }

    body.dark-mode .api-session-hint.api-session-hint-invalid {
      color: #ef5350;
    }

    .api-create-raid-name {
      flex: 1 1 0;
      min-width: 0;
      box-sizing: border-box;
      font-size: 11px;
      padding: 5px 6px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      color: #333;
    }

    body.dark-mode .api-create-raid-name {
      background: #2d2d2d;
      border-color: #555;
      color: #e0e0e0;
    }

    .api-raidtick-queue-row {
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
    }

    .api-raidtick-slots {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      flex: 1 1 0;
      min-width: 0;
    }

    .api-raidtick-slot-btn {
      font-size: 11px;
      width: auto;
      min-width: 36px;
      padding: 0 6px;
      gap: 1px;
    }

    .api-raidtick-slot-num {
      font-weight: 700;
      font-size: 12px;
      line-height: 1;
      color: #1565c0;
    }

    .api-raidtick-slot-btn.api-raidtick-slot-queued {
      box-shadow: inset 0 0 0 2px #2e7d32;
      background: rgba(46, 125, 50, 0.14);
    }

    body.dark-mode .api-raidtick-slot-btn.api-raidtick-slot-queued {
      box-shadow: inset 0 0 0 2px #66bb6a;
      background: rgba(102, 187, 106, 0.18);
    }

    .api-session-hint.api-session-hint-queued {
      color: #2e7d32;
      font-weight: 600;
    }

    body.dark-mode .api-session-hint.api-session-hint-queued {
      color: #81c784;
    }

    .api-raidtick-upload:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .eq-log-header-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .eq-log-auto-post {
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 600;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      color: #fff;
      min-width: 118px;
    }

    .eq-log-auto-post.off { background: #c62828; }
    .eq-log-auto-post.on { background: #2e7d32; }

    .eq-log-post-all {
      padding: 2px 8px;
      font-size: 10px;
      background: #1565c0;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .eq-log-post-all:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    body.dark-mode .eq-log-raid-status {
      color: #90a4b8;
    }

    body.dark-mode .eq-log-raid-status.eq-log-raid-status-invalid {
      color: #ef5350;
    }

    body.dark-mode .eq-log-item-queue {
      background: #388e3c;
    }

    body.dark-mode .eq-log-item-queue:hover {
      background: #2e7d32;
    }
    /* Dark mode styles */
    body.dark-mode {
      background: #1a1a1a;
      color: #e0e0e0;
    }
    
    body.dark-mode .header h1 {
      color: #e0e0e0;
    }
    
    body.dark-mode .icon-btn {
      color: #e8edf4;
    }

    body.dark-mode .icon-btn:hover {
      background-color: #333;
    }

    body.dark-mode .icon-btn:active {
      background-color: #444;
    }

    body.dark-mode .api-raidtick-slot-btn .api-raidtick-slot-num {
      color: #90caf9;
    }

    body.dark-mode .api-raidtick-upload:disabled {
      color: #78909c;
    }
    
    body.dark-mode .status {
      background: #2d2d2d;
      border-color: #555;
      color: #e0e0e0;
    }
    
    body.dark-mode .status.active {
      background: #1b5e20;
      border-color: #4caf50;
      color: #a5d6a7;
    }
    
    body.dark-mode .status.inactive {
      background: #e65100;
      border-color: #ff9800;
      color: #ffcc02;
    }
    
    body.dark-mode .status.success {
      background: #1b5e20;
      border-color: #4caf50;
      color: #a5d6a7;
    }
    
    /* Loot Parser section: blue accent and contrast (Issue #7) */
    body.dark-mode .eq-log-section {
      background: #1e2a3a;
      border-color: #2d5a8c;
      border-width: 1px;
    }
    
    body.dark-mode .eq-log-section h3 {
      color: #64b5f6;
    }
    
    body.dark-mode .eq-log-event {
      background: #263548;
      border-color: #355070;
    }
    
    body.dark-mode .eq-log-event-header {
      border-color: #355070;
    }
    
    body.dark-mode .eq-log-event-timestamp {
      color: #90a4b8;
    }
    
    body.dark-mode .eq-log-event-close {
      color: #90a4b8;
    }
    
    body.dark-mode .eq-log-event-close:hover {
      background: #355070;
      color: #64b5f6;
    }
    
    body.dark-mode .eq-log-item {
      background: #2d3d52;
      border-color: #355070;
    }
    
    body.dark-mode .eq-log-item-name {
      color: #e8edf4;
    }
    
    body.dark-mode .eq-log-item .btn,
    body.dark-mode .eq-log-item .btn-primary,
    body.dark-mode .eq-log-item-copy {
      background: #1976d2;
      color: #fff;
      border-color: #2563b0;
    }
    
    body.dark-mode .eq-log-item .btn:hover,
    body.dark-mode .eq-log-item .btn-primary:hover,
    body.dark-mode .eq-log-item-copy:hover {
      background: #2563b0;
      color: #fff;
    }
    
    body.dark-mode .btn {
      background: #3d5a73;
      color: #e0e0e0;
      border-color: #4a6b8a;
    }
    
    body.dark-mode .btn:hover {
      background: #4a6b8a;
    }
    
    body.dark-mode .btn:active {
      background: #355070;
    }
    
    body.dark-mode .btn-primary {
      background: #1976d2;
      color: white;
      border-color: #1976d2;
    }
    
    body.dark-mode .btn-primary:hover {
      background: #1565c0;
      border-color: #1565c0;
    }
    
    body.dark-mode .btn-secondary {
      background: #3d5a73;
      color: #e0e0e0;
      border-color: #4a6b8a;
    }
    
    body.dark-mode .btn-secondary:hover {
      background: #4a6b8a;
    }
    
    body.dark-mode .empty-state {
      color: #90a4b8;
    }
    
    /* Dark mode scrollbar */
    body.dark-mode .eq-log-events::-webkit-scrollbar-track {
      background: #2d2d2d;
    }
    
    body.dark-mode .eq-log-events::-webkit-scrollbar-thumb {
      background: #666;
    }
    
    body.dark-mode .eq-log-events::-webkit-scrollbar-thumb:hover {
      background: #888;
    }
    
    
    body.dark-mode .info {
      background: #1e2a3a;
      border: 1px solid #2d5a8c;
      color: #b8d4e8;
    }
    
    body.dark-mode .info strong {
      color: #64b5f6;
    }
    
    /* Volume slider and text in dark mode */
    body.dark-mode .volume-inline {
      color: #e0e0e0;
    }
    
    body.dark-mode .volume-pct {
      color: #90caf9;
    }
    
    /* Folder and file path text in dark mode */
    body.dark-mode #eqLogFilePath {
      color: #b0b0b0;
    }
    
    body.dark-mode #eqLogDebugLog {
      background: #333;
      border-color: #555;
      color: #e0e0e0;
    }
    
    body.dark-mode #eqLogDebugLog .debug-content > div {
      background: #444;
      color: #e0e0e0;
    }
    
    /* Status text elements in dark mode */
    body.dark-mode .status small {
      color: #b0b0b0;
    }
    
    /* Small helper text in dark mode */
    body.dark-mode .description,
    body.dark-mode div[style*="font-size: 10px"] {
      color: #b0b0b0 !important;
    }
  </style>
</head>
<body>
  <div class="header" style="flex-direction: column; gap: 8px;">
    <h1 style="text-align:center; width:100%;">OpenDKP Helper</h1>
    <div class="header-icons" style="justify-content:center; gap:10px;">
      <button id="openOptions" class="icon-btn" title="Open Settings">⚙️</button>
      <button id="darkModeToggle" class="icon-btn" title="Toggle Dark Mode"><span id="darkModeIcon">☀️</span></button>
      <button id="modeToggle" class="icon-btn" title="Toggle Mode (Raid Leader/Raider)"><span id="modeIcon">👑</span></button>
      <button id="copyFromFileBtn" class="icon-btn" title="Copy RaidTick file to clipboard">📄</button>
      <button id="openLootMonitorBtn" class="icon-btn" title="Open Loot Monitor">🕒</button>
    </div>
  </div>
  
  <!-- Inline volume control: between header and status -->
  <div class="volume-inline" id="inlineVolume">
    <span id="volumeIcon" class="vol-icon" title="Save volume">🔊</span>
    <input id="volumeSlider" type="range" min="0" max="100" value="70" />
    <span id="volumePct" class="volume-pct">70%</span>
  </div>
  
  <div id="status" class="status">
    <div id="statusText">Checking status...</div>
  </div>

  <div id="apiSessionRow" class="api-session-row">
    <div class="api-session-toolbar">
      <button type="button" id="apiSessionBtn" class="icon-btn api-session-btn" title="Sign in to OpenDKP API">🔑</button>
      <select id="apiRaidSelect" class="api-raid-select" title="Current raid for loot queue">
        <option value="">— Select raid —</option>
      </select>
    </div>
    <div id="apiCreateRaidRow" class="api-session-toolbar" style="display: none;">
      <button type="button" id="apiCreateRaidBtn" class="icon-btn api-session-btn" title="Create raid">➕</button>
      <input type="text" id="apiCreateRaidName" class="api-create-raid-name" placeholder="New raid name" autocomplete="off">
    </div>
    <div id="apiRaidtickQueueRow" class="api-session-toolbar api-raidtick-queue-row" style="display: none;">
      <div id="apiRaidtickSlotButtons" class="api-raidtick-slots"></div>
      <button type="button" id="apiRaidtickUploadBtn" class="icon-btn api-session-btn api-raidtick-upload" title="Upload all queued tick logs to OpenDKP" disabled>⬆️</button>
    </div>
    <div id="apiSessionHint" class="api-session-hint"></div>
  </div>
  
  
  <div id="eqLogSection" class="eq-log-section" style="display: none;">
    <div style="margin-bottom: 12px;">
      <div style="display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap;">
        <h3 style="margin: 0;">⚔️ Loot Parser</h3>
        <div class="eq-log-header-actions">
          <button type="button" id="toggleAutoPost" class="eq-log-auto-post off">Auto post: Off</button>
          <button type="button" id="clearTodayLoot" class="btn btn-secondary" style="padding: 4px 8px; font-size: 11px;" title="Remove today's captured loot from this list">Clear today</button>
        </div>
      </div>
    </div>
    <div id="eqLogEvents" class="eq-log-events">
      <div class="empty-state">No loot events captured yet.</div>
    </div>
  </div>
  
  <div class="info" id="quickInfo" style="display:none;"></div>
  
  <script src="popup-loader.js"></script>
</body>
</html>
