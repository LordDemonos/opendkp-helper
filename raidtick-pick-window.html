<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Queue RaidTick log</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 16px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    .card {
      background: #2d2d2d;
      border: 1px solid #555;
      border-radius: 8px;
      padding: 16px;
    }
    .title {
      margin: 0 0 8px 0;
      font-size: 14px;
      font-weight: 600;
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #b0b0b0;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    button {
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 500;
    }
  </style>
  <script src="lib/opendkp-api.js"></script>
  <script src="lib/raidtick-parse.js"></script>
  <script src="lib/raidtick-queue.js"></script>
  <script defer src="raidtick-pick-window.js"></script>
</head>
<body>
  <div class="card">
    <div class="title" id="title">Queue RaidTick log</div>
    <div id="ui">
      <button id="pick" type="button">Choose .txt file</button>
      <input id="fileInput" type="file" accept=".txt,text/plain" style="display:none;" />
      <div class="status" id="status">Waiting for file selection...</div>
    </div>
  </div>
</body>
</html>
